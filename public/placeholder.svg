<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#0b2a4a"/>
    </linearGradient>

    <!-- Brand gradient -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Accent line -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="12"/>

  <!-- Logo container -->
  <rect x="30" y="50" width="110" height="110" rx="20" fill="#ffffff"/>

  <!-- Sun -->
  <circle cx="75" cy="85" r="18" fill="#f59e0b"/>

  <!-- Solar panel -->
  <rect x="60" y="95" width="60" height="30" fill="#2563eb" rx="4"/>
  <line x1="60" y1="110" x2="120" y2="110" stroke="#fff" stroke-width="1"/>
  <line x1="80" y1="95" x2="80" y2="125" stroke="#fff" stroke-width="1"/>
  <line x1="100" y1="95" x2="100" y2="125" stroke="#fff" stroke-width="1"/>

  <!-- Leaf -->
  <path d="M110 125 Q140 100 165 125 Q140 150 110 125" fill="#22c55e"/>

  <!-- Brand name -->
  <text x="180" y="95" font-size="42" font-weight="700" fill="url(#brandGrad)" font-family="Segoe UI, Arial">
    VV Solar Solutions
  </text>

  <!-- Gradient divider -->
  <rect x="180" y="110" width="650" height="3" fill="url(#lineGrad)" rx="2"/>

  <!-- Features -->
  <text x="180" y="140" font-size="16" fill="#22c55e" font-family="Segoe UI">⚡ Clean Energy</text>
  <text x="360" y="140" font-size="16" fill="#3b82f6" font-family="Segoe UI">🛡 Reliable Solutions</text>
  <text x="600" y="140" font-size="16" fill="#f59e0b" font-family="Segoe UI">🌱 Sustainable Future</text>

  <!-- Subtitle -->
  <text x="180" y="170" font-size="16" fill="#cbd5f5" font-family="Segoe UI">
    Unit of Techno Sync Soft Solutions Pvt Ltd
  </text>

</svg>
